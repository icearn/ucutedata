services:
  db:
    image: postgres:15
    container_name: kiwisaver_db
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DB_NAME:-kiwisaver}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-kiwisaver}"]
      interval: 5s
      timeout: 5s
      retries: 12

  kafka:
    image: apache/kafka:3.8.1
    container_name: kiwisaver_kafka
    restart: unless-stopped
    ports:
      - "9094:9094"
    environment:
      CLUSTER_ID: "abcdefghijklmnopqrstuv"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: kiwisaver_api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8001:8000"

  crawler:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: kiwisaver_crawler
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DB_HOST: db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TZ: "${TZ:-Pacific/Auckland}"
      CRON_SCHEDULE: "${CRON_SCHEDULE:-15 18 * * 1-5}"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    command: ["/bin/sh", "/app/docker/start-crawler-cron.sh"]

  message_hub:
    build:
      context: ../../message-hub
      dockerfile: Dockerfile
    container_name: message_hub
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MESSAGE_HUB_TOPIC: ${MESSAGE_HUB_TOPIC:-message-hub.notifications.v1}
      MESSAGE_HUB_DEFAULT_CHANNELS: ${MESSAGE_HUB_DEFAULT_CHANNELS:-console}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMS_WEBHOOK_URL: ${SMS_WEBHOOK_URL:-}
      WHATSAPP_WEBHOOK_URL: ${WHATSAPP_WEBHOOK_URL:-}
      IM_WEBHOOK_URL: ${IM_WEBHOOK_URL:-}
      MESSAGE_HUB_WEBHOOK_TARGETS_JSON: ${MESSAGE_HUB_WEBHOOK_TARGETS_JSON:-{}}
    depends_on:
      kafka:
        condition: service_started
    ports:
      - "8010:8010"

  pgadmin:
    image: dpage/pgadmin4
    container_name: kiwisaver_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kiwisaver.app
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  kafka_data:
