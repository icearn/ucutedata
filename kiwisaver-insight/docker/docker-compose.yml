version: '3.8'

services:
  db:
    image: postgres:15
    container_name: kiwisaver_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: kiwisaver_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kiwisaver.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - db

  crawler:
    build: .
    container_name: kiwisaver_crawler
    restart: on-failure
    env_file:
      - .env
    depends_on:
      - db
    command: ["python", "kiwisaver_insight/main.py"]

volumes:
  pgdata:
